server:
  port: 8080
  tomcat:
    max-swallow-size: -1

spring:
  application:
    name: video-processing-api

  servlet:
    multipart:
      max-file-size: 3GB
      max-request-size: 3GB

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:videodb}
    username: ${POSTGRES_USER:videouser}
    password: ${POSTGRES_PASSWORD:videopass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Application config
app:
  storage:
    base-path: ${STORAGE_PATH:/data/blobs}
    base-url: ${BASE_URL:http://localhost:8080}
    sas-secret: ${SAS_SECRET:my-super-secret-key-for-sas-token-generation}
    sas-expiry-minutes: 60
  rabbitmq:
    exchange: video-exchange
    queue: video-transcoding-queue
    routing-key: video.transcode

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
