apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: video-platform
data:
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "videodb"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  STORAGE_PATH: "/data/blobs"
  BASE_URL: "http://backend:8080"
  API_BASE_URL: "http://backend:8080"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: video-platform
type: Opaque
stringData:
  POSTGRES_USER: videouser
  POSTGRES_PASSWORD: videopass
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  SAS_SECRET: my-super-secret-key-for-sas-token-generation
