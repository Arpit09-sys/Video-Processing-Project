version: '3.8'

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vpp-postgres
    environment:
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videouser -d videodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpp-network

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vpp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpp-network

  # ─── RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vpp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - vpp-network

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpp-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: videodb
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      STORAGE_PATH: /data/blobs
      BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - blob_storage:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vpp-network

  # ─── Worker Service ───────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: vpp-worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      STORAGE_PATH: /data/blobs
      API_BASE_URL: http://backend:8080
    volumes:
      - blob_storage:/data/blobs
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - vpp-network

  # ─── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vpp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vpp-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  blob_storage:

networks:
  vpp-network:
    driver: bridge
